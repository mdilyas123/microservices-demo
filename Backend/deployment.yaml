apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: node:18
        command: ["sh", "-c", "npm install -g json-server && json-server --watch /data/db.json --host 0.0.0.0"]
        ports:
        - containerPort: 3000
